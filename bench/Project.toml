# Dedicated environment for the GPU benchmarks (kept out of the GraphGP package deps so the
# library stays backend-agnostic / CUDA-free for standalone use).
#
#   julia --project=julia/GraphGP/bench -e 'using Pkg; Pkg.instantiate()'
#   julia --project=julia/GraphGP/bench julia/GraphGP/test/bench_gpu.jl 1000000 10 3
[deps]
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"
GraphGP = "58493978-3208-4978-a170-e38d678289e7"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
NPZ = "15e1cf62-19b3-5cfa-8e77-841668bca605"
Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"

[sources]
GraphGP = {path = ".."}

[compat]
CUDA = "6.2.0"
NPZ = "0.4.3"
julia = "1.10"
