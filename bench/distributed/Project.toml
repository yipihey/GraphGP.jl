# Dedicated environment for the distributed (MPI) GraphGP benchmarks + tests. Kept separate so
# the core package stays MPI-free (MPI is a weakdep/extension). For cluster runs, bind MPI.jl to
# the system OpenMPI with MPIPreferences.use_system_binary() (see README); the default JLL MPI
# is fine for local multi-rank testing via `mpiexec`.
#
#   julia --project=bench/distributed -e 'using Pkg; Pkg.instantiate()'
[deps]
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"
GraphGP = "58493978-3208-4978-a170-e38d678289e7"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
MPI = "da04e1cc-30fd-572f-bb4f-1f8673147195"
MPIPreferences = "3da0fdf6-3ccc-4f1b-acd9-58baa6c99267"
NPZ = "15e1cf62-19b3-5cfa-8e77-841668bca605"
Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"

[sources]
GraphGP = {path = "../.."}
